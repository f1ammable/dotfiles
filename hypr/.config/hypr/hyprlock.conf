# Day-Month-Date
label {
    monitor = DP-2
    text = cmd[update:1000] echo "<span foreground='##7E9557'>$(date '+%A, %B %d')</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 35
    font_family = SpaceMono Nerd Font Bold
    position = 0, 310
    halign = center
    valign = center
}

# Time
label {
    monitor = DP-2
    text = cmd[update:1000] echo "<span foreground='##7E9557'>$(date '+%H:%M')</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 140
    font_family = SpaceMono Nerd Font Bold
    position = 0, 440
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-2
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.25 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(60, 56, 54, 0.79)
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    font_family = SpaceMono Nerd Font Bold
    placeholder_text = <i><span font='SpaceMono' foreground="##EBDBB2">Welcome back, $USER</span></i>
    hide_input = false
    position = 0, -310
    halign = center
    valign = center
}

