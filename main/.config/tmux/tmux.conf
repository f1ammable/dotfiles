set -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "$TERM"
set -g history-limit 10000
set -g mouse on
set -g renumber-windows on

# Prefix
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

# Config Reload
bind "r" source-file ~/.tmux.conf \; display "Config reloaded"

# Pane indexing
set -g base-index 1
setw -g pane-base-index 1

# Window
unbind c
bind c new-window -c "#{pane_current_path}"

# Remove confirm before killing window
unbind x
bind x kill-pane

unbind &
bind & kill-window

# Make it look nicer

# Status bar
set-option -g status-style bg=terminal,fg='#ebdbb2'
set-option -g status-left-style bg=terminal,fg='#ebdbb2'
set-option -g status-right-style bg=terminal,fg='#ebdbb2'

# Window status
set-window-option -g window-status-style bg=terminal,fg='#a89984'
set-window-option -g window-status-current-style bg='#8ec07c',fg='#282828',bold

# Pane borders
set-option -g pane-border-style fg='#504945'
set-option -g pane-active-border-style fg='#8ec07c'

# Message styling
set-option -g message-style bg='#8ec07c',fg='#282828',bold
set-option -g message-command-style bg='#504945',fg='#ebdbb2'

# Window status format
set-option -g window-status-format " #I:#W "
set-option -g window-status-current-format " #I:#W "

set-option -g status-justify centre
set-option -g status-right ""
set-option -g status-left ""

