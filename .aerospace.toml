# Reference: https://github.com/i3/i3/blob/next/etc/config

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

after-startup-command = [
  'exec-and-forget sketchybar',
  'exec-and-forget borders active_color=0xff8ec07c inactive_color=0x408ec07c width=6.0 hidpi=on'
]

exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[mode.main.binding]
alt-enter = 'exec-and-forget open -n /Applications/Ghostty.app'
alt-z = 'exec-and-forget open /System/Library/CoreServices/Finder.app'

alt-j = 'focus left'
alt-k = 'focus down'
alt-l = 'focus up'
alt-semicolon = 'focus right'

alt-shift-j = 'move left'
alt-shift-k = 'move down'
alt-shift-l = 'move up'
alt-shift-semicolon = 'move right'

alt-h = 'split horizontal'
alt-v = 'split vertical'

alt-f = 'fullscreen'

alt-s = 'layout v_accordion' # 'layout stacking' in i3
alt-w = 'layout h_accordion' # 'layout tabbed' in i3
alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

# Not supported, because this command is redundant in AeroSpace mental model.
# See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
#alt-space = 'focus toggle_tiling_floating'

# `focus parent`/`focus child` are not yet supported, and it's not clear whether they
# should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
# alt-a = 'focus parent'

ctrl-alt-1 = 'workspace 1'
ctrl-alt-2 = 'workspace 2'
ctrl-alt-3 = 'workspace 3'
ctrl-alt-4 = 'workspace 4'
ctrl-alt-5 = 'workspace 5'
ctrl-alt-6 = 'workspace 6'
ctrl-alt-7 = 'workspace 7'
ctrl-alt-8 = 'workspace 8'
ctrl-alt-9 = 'workspace 9'
ctrl-alt-0 = 'workspace 10'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

cmd-ctrl-1 = 'move-node-to-workspace 1 --focus-follows-window'
cmd-ctrl-2 = 'move-node-to-workspace 2 --focus-follows-window'
cmd-ctrl-3 = 'move-node-to-workspace 3 --focus-follows-window'
cmd-ctrl-4 = 'move-node-to-workspace 4 --focus-follows-window'
cmd-ctrl-5 = 'move-node-to-workspace 5 --focus-follows-window'
cmd-ctrl-6 = 'move-node-to-workspace 6 --focus-follows-window'
cmd-ctrl-7 = 'move-node-to-workspace 7 --focus-follows-window'
cmd-ctrl-8 = 'move-node-to-workspace 8 --focus-follows-window'
cmd-ctrl-9 = 'move-node-to-workspace 9 --focus-follows-window'
cmd-ctrl-0 = 'move-node-to-workspace 10 --focus-follows-window'


alt-shift-c = 'reload-config'

alt-r = 'mode resize'

# Multi-monitor
alt-shift-m = 'move-workspace-to-monitor --wrap-around next'


[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'main'
6 = ['secondary', 'main']
7 = ['secondary', 'main']
8 = ['secondary', 'main']
9 = ['secondary', 'main']

[mode.resize.binding]
j = 'resize width -50'
k = 'resize height +50'
l = 'resize height -50'
semicolon = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = [
 {monitor."built-in" = 20 },
 {monitor."main" = 60},
 60
]
outer.right = 10
